name: Publish Libraries

on:
  push:
    tags:
      # Matches tags like my-ui-lib@1.0.0
      - '*@*.*.*'
  # Adds the manual trigger button in the GitHub UI
  workflow_dispatch:
    inputs:
      project_name:
        description: 'Name of the library to publish (e.g., my-ui-lib)'
        required: true
        type: string

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      # 1. Determine the project name (handles both Tag and Manual triggers)
      - name: Determine Project Name
        id: extract
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # If triggered manually, use the input provided in the UI
            PROJECT_NAME="${{ inputs.project_name }}"
            echo "Manual trigger detected."
          else
            # If triggered by a tag push, extract it from the tag name
            TAG_NAME=${{ github.ref_name }}
            PROJECT_NAME="${TAG_NAME%@*}"
            echo "Tag push detected."
          fi

          echo "Targeting project: $PROJECT_NAME"
          echo "project=$PROJECT_NAME" >> $GITHUB_OUTPUT

      # 2. Build ONLY the targeted library
      - name: Build targeted library
        run: npx nx build ${{ steps.extract.outputs.project }}

      # 3. Publish to GitHub Packages
      - name: Publish to GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_GIT_TOKEN }}
          NPM_CONFIG_REGISTRY: 'https://npm.pkg.github.com/'
        run: |
          # Map the GitHub token to the GitHub registry URL
          npm config set //npm.pkg.github.com/:_authToken $NODE_AUTH_TOKEN
          npx nx release publish -p ${{ steps.extract.outputs.project }}

      # 4. Publish to NPM Registry (Optional)
      - name: Publish to NPM Registry
        if: vars.ENABLE_NPM_PUBLISH == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_REGISTRY: 'https://registry.npmjs.org/'
        run: |
          # Map the NPM token to the NPM registry URL
          npm config set //registry.npmjs.org/:_authToken $NODE_AUTH_TOKEN
          npx nx release publish -p ${{ steps.extract.outputs.project }}
