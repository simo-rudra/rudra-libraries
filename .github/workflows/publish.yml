name: Publish Libraries

on:
  push:
    tags:
      # Matches tags like my-ui-lib@1.0.0 or utils@2.1.3
      - '*@*.*.*'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      # 1. Extract the library name from the Git tag
      - name: Extract Project Name
        id: extract
        run: |
          # ${{ github.ref_name }} contains the tag name (e.g., my-ui-lib@1.0.0)
          # This bash command splits the string at '@' and keeps the first part
          TAG_NAME=${{ github.ref_name }}
          PROJECT_NAME="${TAG_NAME%@*}"

          echo "Targeting project: $PROJECT_NAME"
          echo "project=$PROJECT_NAME" >> $GITHUB_OUTPUT

      # 2. Build ONLY the targeted library
      - name: Build targeted library
        run: npx nx build ${{ steps.extract.outputs.project }}

      # 3. Publish to GitHub Packages (Primary target for now)
      - name: Publish to GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_REGISTRY: 'https://npm.pkg.github.com/'
        # Use the -p flag to tell Nx to only publish this specific project
        run: npx nx release publish -p ${{ steps.extract.outputs.project }}

      # 4. Publish to NPM Registry (Optional / Disabled by default)
      # To enable this, go to your GitHub Repo Settings -> Environments / Variables
      # and create a Repository Variable named ENABLE_NPM_PUBLISH and set it to 'true'
      - name: Publish to NPM Registry
        if: vars.ENABLE_NPM_PUBLISH == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_REGISTRY: 'https://registry.npmjs.org/'
        run: npx nx release publish -p ${{ steps.extract.outputs.project }}
