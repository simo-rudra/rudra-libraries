name: Publish Libraries

on:
  push:
    tags:
      # Matches tags like my-ui-lib@1.0.0
      - '*@*.*.*'

  workflow_dispatch:
    inputs:
      project_name:
        description: 'Name of the library (e.g., my-ui-lib)'
        required: true
        type: string
      version:
        description: 'Version (e.g., 1.0.0)'
        required: false
        type: string

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org/'

      - name: Install dependencies
        run: npm ci

      # 🔥 Extract project + version (supports both tag + manual)
      - name: Determine Project and Version
        id: extract
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PROJECT_NAME="${{ inputs.project_name }}"
            VERSION="${{ inputs.version }}"

            if [ -z "$VERSION" ]; then
              echo "❌ Version is required for manual trigger"
              exit 1
            fi

            echo "Manual trigger detected"
          else
            TAG_NAME=${{ github.ref_name }}
            PROJECT_NAME="${TAG_NAME%@*}"
            VERSION="${TAG_NAME#*@}"

            echo "Tag trigger detected"
          fi

          echo "Project: $PROJECT_NAME"
          echo "Version: $VERSION"

          echo "project=$PROJECT_NAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # 🔥 Build ONLY the targeted library
      - name: Build library
        run: npx nx build ${{ steps.extract.outputs.project }}

      # 🔥 Ensure package.json exists in dist
      - name: Validate package.json
        run: |
          if [ ! -f "dist/libs/${{ steps.extract.outputs.project }}/package.json" ]; then
            echo "❌ package.json not found in dist. Fix your Nx build config."
            exit 1
          fi

      # 🔥 Set correct version before publish
      - name: Set version
        run: |
          cd dist/libs/${{ steps.extract.outputs.project }}
          npm version ${{ steps.extract.outputs.version }} --no-git-tag-version

      # 🔥 Publish to GitHub Packages
      - name: Publish to GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_GIT_TOKEN }}
        run: |
          cd dist/libs/${{ steps.extract.outputs.project }}
          npm config set registry https://npm.pkg.github.com/
          npm publish

      # 🔥 Publish to NPM (optional)
      - name: Publish to NPM Registry
        if: vars.ENABLE_NPM_PUBLISH == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd dist/libs/${{ steps.extract.outputs.project }}
          npm config set registry https://registry.npmjs.org/
          npm publish --access public
